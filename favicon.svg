<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- The brand mark is an AI-rendered raster; the exact artwork is embedded (a hand-traced vector
       couldn't match it). Rounded-tile clipped so the tab icon reads as an app chip. -->
  <clipPath id="r"><rect width="512" height="512" rx="116"/></clipPath>
  <image width="512" height="512" clip-path="url(#r)" href="data:image/png;base64,"/>
</svg>
